<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="食堂の窓辺">
  <defs>
    <linearGradient id="forestG4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B9358"/><stop offset="1" stop-color="#1B2E22"/>
    </linearGradient>
    <radialGradient id="winLight" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#D9C28B" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#D9C28B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#15241B"/>
  <!-- big window -->
  <rect x="40" y="30" width="720" height="380" fill="url(#forestG4)" stroke="#5B4530" stroke-width="10"/>
  <line x1="280" y1="30" x2="280" y2="410" stroke="#5B4530" stroke-width="8"/>
  <line x1="520" y1="30" x2="520" y2="410" stroke="#5B4530" stroke-width="8"/>
  <line x1="40" y1="220" x2="760" y2="220" stroke="#5B4530" stroke-width="6"/>
  <rect x="40" y="30" width="720" height="380" fill="url(#winLight)"/>
  <!-- forest behind -->
  <g fill="rgba(15,27,20,0.7)">
    <polygon points="60,410 160,180 260,410"/>
    <polygon points="290,410 400,150 510,410"/>
    <polygon points="540,410 640,180 740,410"/>
  </g>
  <g fill="#6FA46B" opacity="0.4">
    <circle cx="160" cy="240" r="60"/>
    <circle cx="400" cy="220" r="80"/>
    <circle cx="640" cy="240" r="60"/>
  </g>
  <!-- table -->
  <rect y="430" width="800" height="80" fill="#0F1B14"/>
  <rect x="0" y="410" width="800" height="22" fill="#7A5A3D"/>
  <!-- coffee cup with steam -->
  <g transform="translate(110,360)">
    <ellipse cx="0" cy="50" rx="50" ry="10" fill="#3a2818"/>
    <rect x="-40" y="-2" width="80" height="50" fill="#F2EFE6"/>
    <ellipse cx="0" cy="-2" rx="40" ry="10" fill="#5B4530"/>
    <ellipse cx="0" cy="-3" rx="34" ry="6" fill="#3a2818"/>
    <path d="M40,8 q22,-5 22,18 q0,18 -22,12" fill="none" stroke="#F2EFE6" stroke-width="5"/>
    <!-- steam -->
    <path d="M-15,-15 q-5,-15 5,-25 q5,-10 -2,-22" fill="none" stroke="#F2EFE6" stroke-width="2" opacity="0.5"/>
    <path d="M0,-15 q-5,-15 5,-25 q5,-10 -2,-22" fill="none" stroke="#F2EFE6" stroke-width="2" opacity="0.5"/>
    <path d="M15,-15 q-5,-15 5,-25 q5,-10 -2,-22" fill="none" stroke="#F2EFE6" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- book -->
  <g transform="translate(620,400)">
    <rect width="120" height="14" fill="#5B4530"/>
    <rect x="2" y="-4" width="116" height="6" fill="#A57E5A"/>
    <line x1="60" y1="-4" x2="60" y2="14" stroke="#3a2818"/>
  </g>
  <!-- plant on sill -->
  <g transform="translate(720,360)">
    <rect x="-15" y="0" width="30" height="40" fill="#5B4530"/>
    <ellipse cx="0" cy="-3" rx="18" ry="6" fill="#3a2818"/>
    <path d="M0,-3 q-15,-25 -25,-30 M0,-3 q5,-30 0,-40 M0,-3 q15,-25 25,-30" fill="none" stroke="#6FA46B" stroke-width="3"/>
    <circle cx="-22" cy="-30" r="6" fill="#6FA46B"/>
    <circle cx="0" cy="-40" r="6" fill="#6FA46B"/>
    <circle cx="22" cy="-30" r="6" fill="#6FA46B"/>
  </g>
</svg>
