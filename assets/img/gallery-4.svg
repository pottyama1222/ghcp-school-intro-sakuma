<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="食堂の窓辺">
  <rect width="800" height="500" fill="#1B2E22"/>
  <!-- window panes -->
  <g>
    <rect x="40" y="40" width="720" height="380" fill="#2F5D3A" stroke="#8C6A4A" stroke-width="8"/>
    <line x1="280" y1="40" x2="280" y2="420" stroke="#8C6A4A" stroke-width="8"/>
    <line x1="520" y1="40" x2="520" y2="420" stroke="#8C6A4A" stroke-width="8"/>
    <line x1="40" y1="230" x2="760" y2="230" stroke="#8C6A4A" stroke-width="8"/>
  </g>
  <!-- forest behind -->
  <g fill="#0F1B14" opacity="0.7">
    <polygon points="60,420 160,200 260,420"/>
    <polygon points="300,420 400,180 500,420"/>
    <polygon points="540,420 640,200 740,420"/>
  </g>
  <!-- coffee cup -->
  <g transform="translate(140,440)">
    <ellipse cx="0" cy="0" rx="40" ry="10" fill="#6E5236"/>
    <rect x="-30" y="-40" width="60" height="40" fill="#F2EFE6"/>
    <ellipse cx="0" cy="-40" rx="30" ry="8" fill="#8C6A4A"/>
    <path d="M30,-30 q20,-5 20,15 q0,15 -20,10" fill="none" stroke="#F2EFE6" stroke-width="4"/>
  </g>
  <rect y="440" width="800" height="60" fill="#0F1B14"/>
</svg>
