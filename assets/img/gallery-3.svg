<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="森の散歩道">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BB07A"/><stop offset="1" stop-color="#1B2E22"/>
    </linearGradient>
    <radialGradient id="mist" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#D9C28B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D9C28B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky3)"/>
  <!-- distant misty trees -->
  <g fill="#2F5D3A" opacity="0.4">
    <polygon points="0,300 80,180 160,300"/>
    <polygon points="120,300 200,160 280,300"/>
    <polygon points="280,300 360,180 440,300"/>
    <polygon points="440,300 520,170 600,300"/>
    <polygon points="600,300 680,180 760,300"/>
  </g>
  <!-- mid trees -->
  <g fill="#1B2E22">
    <polygon points="60,400 140,160 220,400"/>
    <polygon points="540,400 620,160 700,400"/>
  </g>
  <g fill="#0F1B14">
    <polygon points="100,420 180,180 260,420"/>
    <polygon points="580,420 660,200 740,420"/>
  </g>
  <!-- trunks -->
  <rect x="170" y="180" width="20" height="240" fill="#3a2818"/>
  <rect x="630" y="200" width="20" height="220" fill="#3a2818"/>
  <!-- ground -->
  <rect y="380" width="800" height="120" fill="#243C2D"/>
  <!-- path -->
  <polygon points="350,500 450,500 480,260 320,260" fill="#7A5A3D"/>
  <polygon points="380,500 420,500 430,260 370,260" fill="#5B4530" opacity="0.6"/>
  <!-- stones along path -->
  <ellipse cx="340" cy="430" rx="14" ry="6" fill="#5C6A5A"/>
  <ellipse cx="465" cy="440" rx="16" ry="7" fill="#5C6A5A"/>
  <ellipse cx="335" cy="380" rx="10" ry="5" fill="#5C6A5A"/>
  <ellipse cx="468" cy="385" rx="11" ry="5" fill="#5C6A5A"/>
  <!-- mist overlay -->
  <ellipse cx="400" cy="200" rx="500" ry="120" fill="url(#mist)"/>
  <!-- light spots -->
  <circle cx="400" cy="380" r="80" fill="#D9C28B" opacity="0.18"/>
  <circle cx="380" cy="320" r="50" fill="#D9C28B" opacity="0.14"/>
  <!-- foreground grass -->
  <g fill="#0F1B14">
    <circle cx="40" cy="430" r="40"/>
    <circle cx="100" cy="450" r="30"/>
    <circle cx="700" cy="430" r="40"/>
    <circle cx="760" cy="450" r="30"/>
  </g>
  <!-- foreground leaves -->
  <g fill="#2F5D3A">
    <ellipse cx="60" cy="420" rx="20" ry="8" transform="rotate(-30 60 420)"/>
    <ellipse cx="740" cy="420" rx="20" ry="8" transform="rotate(30 740 420)"/>
  </g>
  <!-- floating particles -->
  <g fill="#E9D6A6" opacity="0.7">
    <circle cx="280" cy="220" r="2"/><circle cx="340" cy="250" r="1.5"/>
    <circle cx="450" cy="200" r="2"/><circle cx="520" cy="240" r="1.5"/>
  </g>
</svg>
