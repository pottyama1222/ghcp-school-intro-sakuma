<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="ラボ">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243C2D"/><stop offset="1" stop-color="#0F1B14"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <!-- workbench -->
  <rect x="60" y="280" width="480" height="20" fill="#8C6A4A"/>
  <rect x="80" y="300" width="20" height="80" fill="#6E5236"/>
  <rect x="500" y="300" width="20" height="80" fill="#6E5236"/>
  <!-- 3D printer -->
  <g transform="translate(120,180)">
    <rect width="120" height="100" fill="#1B2E22" stroke="#6FA46B" stroke-width="2"/>
    <rect x="20" y="20" width="80" height="50" fill="#D9C28B" opacity="0.3"/>
    <circle cx="60" cy="45" r="6" fill="#D9C28B"/>
  </g>
  <!-- monitor -->
  <g transform="translate(300,160)">
    <rect width="160" height="110" fill="#0F1B14" stroke="#6FA46B" stroke-width="2"/>
    <rect x="10" y="10" width="140" height="80" fill="#2F5D3A"/>
    <rect x="20" y="20" width="60" height="6" fill="#6FA46B"/>
    <rect x="20" y="32" width="100" height="6" fill="#D9C28B"/>
    <rect x="20" y="44" width="80" height="6" fill="#6FA46B"/>
  </g>
  <!-- tools -->
  <circle cx="100" cy="270" r="6" fill="#D9C28B"/>
  <circle cx="120" cy="270" r="6" fill="#6FA46B"/>
  <rect x="500" y="240" width="40" height="40" fill="#6E5236"/>
</svg>
