<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="ラボ">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243C2D"/><stop offset="1" stop-color="#0F1B14"/>
    </linearGradient>
    <linearGradient id="bench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A57E5A"/><stop offset="1" stop-color="#6E5236"/>
    </linearGradient>
    <radialGradient id="lampL" cx="0.5" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#D9C28B" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#D9C28B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <!-- pendant lamp glow -->
  <ellipse cx="180" cy="260" rx="180" ry="120" fill="url(#lampL)"/>
  <ellipse cx="420" cy="240" rx="160" ry="110" fill="url(#lampL)" opacity="0.7"/>
  <!-- pegboard wall -->
  <rect x="40" y="40" width="520" height="160" fill="#1B2E22"/>
  <g fill="#0F1B14" opacity="0.6">
    <circle cx="80" cy="80" r="3"/><circle cx="110" cy="80" r="3"/><circle cx="140" cy="80" r="3"/>
    <circle cx="80" cy="110" r="3"/><circle cx="110" cy="110" r="3"/><circle cx="140" cy="110" r="3"/>
    <circle cx="80" cy="140" r="3"/><circle cx="110" cy="140" r="3"/><circle cx="140" cy="140" r="3"/>
  </g>
  <!-- tools on wall -->
  <rect x="180" y="60" width="6" height="50" fill="#8C6A4A"/>
  <polygon points="170,110 196,110 183,130" fill="#8C6A4A"/>
  <rect x="220" y="70" width="60" height="10" fill="#6E5236"/>
  <rect x="220" y="90" width="40" height="10" fill="#6E5236"/>
  <rect x="320" y="60" width="40" height="40" fill="none" stroke="#6FA46B" stroke-width="2"/>
  <text x="340" y="86" text-anchor="middle" fill="#6FA46B" font-family="monospace" font-size="14">{ }</text>
  <rect x="400" y="70" width="80" height="60" fill="#0F1B14" stroke="#6FA46B" stroke-width="2"/>
  <text x="440" y="105" text-anchor="middle" fill="#D9C28B" font-family="monospace" font-size="12">MAKE</text>
  <!-- pendant lamp cords -->
  <line x1="180" y1="40" x2="180" y2="200" stroke="#3a2818" stroke-width="2"/>
  <line x1="420" y1="40" x2="420" y2="180" stroke="#3a2818" stroke-width="2"/>
  <ellipse cx="180" cy="210" rx="40" ry="14" fill="#D9C28B"/>
  <ellipse cx="420" cy="190" rx="36" ry="12" fill="#D9C28B"/>
  <!-- workbench -->
  <rect x="40" y="280" width="520" height="22" fill="url(#bench)"/>
  <rect x="60" y="302" width="22" height="80" fill="#5B4530"/>
  <rect x="518" y="302" width="22" height="80" fill="#5B4530"/>
  <!-- 3D printer -->
  <g transform="translate(110,180)">
    <rect width="120" height="100" fill="#1B2E22" stroke="#6FA46B" stroke-width="2"/>
    <rect x="20" y="20" width="80" height="50" fill="#D9C28B" opacity="0.35"/>
    <rect x="40" y="35" width="40" height="20" fill="#6FA46B" opacity="0.6"/>
    <circle cx="60" cy="78" r="4" fill="#D9C28B"/>
    <text x="60" y="95" text-anchor="middle" fill="#6FA46B" font-family="sans-serif" font-size="9">3D PRINT</text>
  </g>
  <!-- monitor -->
  <g transform="translate(290,160)">
    <rect width="170" height="120" fill="#0F1B14" stroke="#6FA46B" stroke-width="2"/>
    <rect x="10" y="10" width="150" height="90" fill="#1B2E22"/>
    <!-- code lines -->
    <rect x="20" y="22" width="50" height="6" fill="#6FA46B"/>
    <rect x="20" y="34" width="100" height="6" fill="#D9C28B"/>
    <rect x="32" y="46" width="80" height="6" fill="#6FA46B"/>
    <rect x="32" y="58" width="60" height="6" fill="#A57E5A"/>
    <rect x="20" y="70" width="40" height="6" fill="#D9C28B"/>
    <rect x="20" y="82" width="90" height="6" fill="#6FA46B"/>
    <!-- monitor stand -->
    <rect x="75" y="120" width="20" height="20" fill="#3a2818"/>
    <rect x="55" y="138" width="60" height="6" fill="#3a2818"/>
  </g>
  <!-- soldering station -->
  <g transform="translate(490,250)">
    <rect width="50" height="30" fill="#3a2818"/>
    <rect x="10" y="8" width="20" height="6" fill="#D9C28B"/>
    <line x1="50" y1="20" x2="80" y2="10" stroke="#6E5236" stroke-width="2"/>
  </g>
  <!-- coffee mug -->
  <g transform="translate(80,260)">
    <rect width="20" height="20" fill="#F2EFE6"/>
    <path d="M20,5 q6,0 6,8 q0,8 -6,8" fill="none" stroke="#F2EFE6" stroke-width="2"/>
    <ellipse cx="10" cy="3" rx="10" ry="3" fill="#5B4530"/>
  </g>
</svg>
