    <g fill="#D9C28B">
      <rect x="50" y="80" width="14" height="50"/><rect x="68" y="80" width="14" height="50"/>
      <rect x="86" y="80" width="14" height="50"/><rect x="104" y="80" width="14" height="50"/>
      <rect x="122" y="80" width="14" height="50"/><rect x="140" y="80" width="14" height="50"/>
      <rect x="158" y="80" width="14" height="50"/><rect x="176" y="80" width="14" height="50"/>
    </g>
    <g fill="#6FA46B">
      <rect x="50" y="150" width="14" height="50"/><rect x="68" y="150" width="14" height="50"/>
      <rect x="86" y="150" width="14" height="50"/><rect x="104" y="150" width="14" height="50"/>
      <rect x="122" y="150" width="14" height="50"/><rect x="140" y="150" width="14" height="50"/>
      <rect x="158" y="150" width="14" height="50"/><rect x="176" y="150" width="14" height="50"/>
    </g>
