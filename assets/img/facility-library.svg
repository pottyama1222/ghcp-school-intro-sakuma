    <g fill="#6FA46B"><rect x="410" y="150" width="14" height="50"/><rect x="428" y="150" width="14" height="50"/><rect x="446" y="150" width="14" height="50"/><rect x="464" y="150" width="14" height="50"/><rect x="482" y="150" width="14" height="50"/><rect x="500" y="150" width="14" height="50"/><rect x="518" y="150" width="14" height="50"/><rect x="536" y="150" width="14" height="50"/></g>
    <g fill="#8C6A4A"><rect x="410" y="220" width="14" height="50"/><rect x="428" y="220" width="14" height="50"/><rect x="446" y="220" width="14" height="50"/><rect x="464" y="220" width="14" height="50"/><rect x="482" y="220" width="14" height="50"/><rect x="500" y="220" width="14" height="50"/><rect x="518" y="220" width="14" height="50"/><rect x="536" y="220" width="14" height="50"/></g>
