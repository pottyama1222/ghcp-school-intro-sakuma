<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="ラボで制作する学生">
  <defs>
    <radialGradient id="lampLight" cx="0.5" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#D9C28B" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D9C28B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#15241B"/>
  <!-- back wall with window -->
  <rect width="800" height="320" fill="#1B2E22"/>
  <rect x="60" y="40" width="280" height="200" fill="#3a6849" stroke="#5B4530" stroke-width="6"/>
  <line x1="200" y1="40" x2="200" y2="240" stroke="#5B4530" stroke-width="6"/>
  <line x1="60" y1="140" x2="340" y2="140" stroke="#5B4530" stroke-width="6"/>
  <!-- trees outside -->
  <g fill="rgba(15,27,20,0.7)">
    <polygon points="80,240 120,80 160,240"/>
    <polygon points="240,240 280,90 320,240"/>
  </g>
  <!-- shelves on right wall -->
  <g>
    <rect x="500" y="60" width="240" height="80" fill="#5B4530"/>
    <rect x="510" y="70" width="20" height="60" fill="#D9C28B"/>
    <rect x="535" y="75" width="20" height="55" fill="#6FA46B"/>
    <rect x="560" y="68" width="20" height="62" fill="#A57E5A"/>
    <rect x="595" y="80" width="40" height="50" fill="#1B2E22" stroke="#6FA46B" stroke-width="2"/>
    <text x="615" y="110" text-anchor="middle" fill="#D9C28B" font-family="monospace" font-size="14">{ }</text>
    <rect x="650" y="75" width="80" height="55" fill="#0F1B14" stroke="#6FA46B" stroke-width="2"/>
    <text x="690" y="108" text-anchor="middle" fill="#6FA46B" font-family="sans-serif" font-size="11">PROJ</text>
  </g>
  <!-- pendant lamps -->
  <g>
    <line x1="430" y1="0" x2="430" y2="160" stroke="#3a2818" stroke-width="2"/>
    <ellipse cx="430" cy="170" rx="40" ry="14" fill="#D9C28B"/>
    <ellipse cx="430" cy="240" rx="160" ry="80" fill="url(#lampLight)"/>
  </g>
  <!-- desk -->
  <rect x="0" y="320" width="800" height="22" fill="#7A5A3D"/>
  <rect x="0" y="342" width="800" height="160" fill="#0F1B14"/>
  <rect x="60" y="342" width="22" height="120" fill="#5B4530"/>
  <rect x="720" y="342" width="22" height="120" fill="#5B4530"/>
  <!-- person 1 -->
  <g transform="translate(360,160)">
    <!-- head -->
    <circle cx="0" cy="0" r="36" fill="#A57E5A"/>
    <!-- hair -->
    <path d="M-36,-5 q5,-40 36,-40 q31,0 36,40 q-10,-15 -36,-15 q-26,0 -36,15 z" fill="#3a2818"/>
    <!-- body / hoodie -->
    <path d="M-50,40 Q-50,30 -30,30 L30,30 Q50,30 50,40 L60,160 L-60,160 Z" fill="#2F5D3A"/>
    <!-- arms forward (typing) -->
    <rect x="-50" y="80" width="20" height="60" fill="#2F5D3A"/>
    <rect x="30" y="80" width="20" height="60" fill="#2F5D3A"/>
  </g>
  <!-- person 2 -->
  <g transform="translate(580,180)">
    <circle cx="0" cy="0" r="32" fill="#8C6A4A"/>
    <path d="M-32,-3 q4,-36 32,-36 q28,0 32,36 q-8,-12 -32,-12 q-24,0 -32,12 z" fill="#5B4530"/>
    <path d="M-44,38 Q-44,28 -26,28 L26,28 Q44,28 44,38 L52,140 L-52,140 Z" fill="#A57E5A"/>
  </g>
  <!-- monitor -->
  <g transform="translate(310,260)">
    <rect width="140" height="80" fill="#0F1B14" stroke="#6FA46B" stroke-width="2"/>
    <rect x="8" y="8" width="124" height="64" fill="#1B2E22"/>
    <rect x="16" y="16" width="50" height="6" fill="#6FA46B"/>
    <rect x="16" y="26" width="90" height="6" fill="#D9C28B"/>
    <rect x="24" y="36" width="70" height="6" fill="#6FA46B"/>
    <rect x="24" y="46" width="50" height="6" fill="#A57E5A"/>
    <rect x="16" y="56" width="80" height="6" fill="#D9C28B"/>
    <rect x="62" y="84" width="16" height="10" fill="#3a2818"/>
    <rect x="50" y="92" width="40" height="6" fill="#3a2818"/>
  </g>
  <!-- coffee -->
  <g transform="translate(220,310)">
    <rect width="22" height="22" fill="#F2EFE6"/>
    <ellipse cx="11" cy="2" rx="11" ry="3" fill="#5B4530"/>
    <path d="M22,5 q6,0 6,8 q0,8 -6,8" fill="none" stroke="#F2EFE6" stroke-width="2"/>
  </g>
  <!-- desk lamp -->
  <g transform="translate(680,250)">
    <rect x="-2" y="0" width="4" height="70" fill="#5B4530"/>
    <line x1="0" y1="0" x2="-22" y2="-26" stroke="#5B4530" stroke-width="3"/>
    <ellipse cx="-26" cy="-28" rx="18" ry="9" fill="#D9C28B"/>
  </g>
</svg>
