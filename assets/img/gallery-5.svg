<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="星空と寮">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1B14"/><stop offset="1" stop-color="#1B2E22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#night)"/>
  <!-- stars -->
  <g fill="#F2EFE6">
    <circle cx="60" cy="50" r="1.5"/><circle cx="120" cy="90" r="1"/>
    <circle cx="200" cy="40" r="2"/><circle cx="280" cy="70" r="1.2"/>
    <circle cx="360" cy="40" r="1.5"/><circle cx="440" cy="100" r="1"/>
    <circle cx="520" cy="50" r="2"/><circle cx="600" cy="80" r="1.2"/>
    <circle cx="680" cy="40" r="1.5"/><circle cx="740" cy="100" r="1"/>
    <circle cx="100" cy="160" r="1"/><circle cx="320" cy="180" r="1.2"/>
    <circle cx="540" cy="170" r="1"/><circle cx="700" cy="200" r="1.5"/>
  </g>
  <!-- moon -->
  <circle cx="660" cy="80" r="36" fill="#D9C28B" opacity="0.85"/>
  <circle cx="650" cy="74" r="32" fill="#0F1B14"/>
  <!-- mountain -->
  <polygon points="0,360 200,200 400,340 600,220 800,360 800,500 0,500" fill="#0F1B14"/>
  <!-- dorm -->
  <g transform="translate(280,300)">
    <rect width="240" height="120" fill="#6E5236"/>
    <polygon points="-20,0 120,-60 260,0" fill="#3a2818"/>
    <rect x="20" y="30" width="30" height="40" fill="#D9C28B"/>
    <rect x="70" y="30" width="30" height="40" fill="#D9C28B"/>
    <rect x="120" y="30" width="30" height="40" fill="#1B2E22"/>
    <rect x="170" y="30" width="30" height="40" fill="#D9C28B"/>
    <rect x="100" y="80" width="40" height="40" fill="#1B2E22"/>
  </g>
</svg>
