<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="星空と寮">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1320"/><stop offset="0.6" stop-color="#1B2E22"/><stop offset="1" stop-color="#0F1B14"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E9D6A6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#E9D6A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="windowGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#D9C28B" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#D9C28B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#night)"/>
  <!-- milky way band -->
  <ellipse cx="400" cy="120" rx="600" ry="40" fill="#E9D6A6" opacity="0.06"/>
  <!-- stars -->
  <g fill="#F2EFE6">
    <circle cx="60" cy="50" r="1.5"/><circle cx="120" cy="90" r="1"/>
    <circle cx="200" cy="40" r="2"/><circle cx="280" cy="70" r="1.2"/>
    <circle cx="360" cy="40" r="1.5"/><circle cx="440" cy="100" r="1"/>
    <circle cx="520" cy="50" r="2"/><circle cx="600" cy="80" r="1.2"/>
    <circle cx="700" cy="40" r="1.5"/><circle cx="760" cy="100" r="1"/>
    <circle cx="100" cy="160" r="1"/><circle cx="320" cy="180" r="1.2"/>
    <circle cx="540" cy="170" r="1"/><circle cx="730" cy="200" r="1.5"/>
    <circle cx="180" cy="220" r="1"/><circle cx="430" cy="220" r="1.2"/>
    <circle cx="80" cy="120" r="1"/><circle cx="240" cy="130" r="1"/>
    <circle cx="500" cy="130" r="1.5"/><circle cx="640" cy="160" r="1"/>
  </g>
  <!-- bright stars with twinkle cross -->
  <g fill="#F2EFE6">
    <circle cx="160" cy="80" r="2.5"/>
    <line x1="155" y1="80" x2="165" y2="80" stroke="#F2EFE6" stroke-width="0.6"/>
    <line x1="160" y1="75" x2="160" y2="85" stroke="#F2EFE6" stroke-width="0.6"/>
    <circle cx="600" cy="60" r="2.5"/>
    <line x1="595" y1="60" x2="605" y2="60" stroke="#F2EFE6" stroke-width="0.6"/>
    <line x1="600" y1="55" x2="600" y2="65" stroke="#F2EFE6" stroke-width="0.6"/>
  </g>
  <!-- moon -->
  <circle cx="660" cy="90" r="80" fill="url(#moonGlow)"/>
  <circle cx="660" cy="80" r="36" fill="#E9D6A6"/>
  <circle cx="650" cy="74" r="32" fill="#0a1320"/>
  <circle cx="678" cy="70" r="3" fill="#E9D6A6" opacity="0.5"/>
  <circle cx="685" cy="86" r="2" fill="#E9D6A6" opacity="0.4"/>
  <!-- mountain silhouettes -->
  <polygon points="0,360 200,200 400,340 600,220 800,360 800,500 0,500" fill="#0F1B14"/>
  <polygon points="0,400 150,300 320,380 500,290 700,400 800,360 800,500 0,500" fill="#07110B"/>
  <!-- trees -->
  <g fill="#07110B">
    <polygon points="80,400 120,300 160,400"/>
    <polygon points="660,400 700,310 740,400"/>
  </g>
  <!-- dorm -->
  <g transform="translate(260,290)">
    <rect width="280" height="140" fill="#5B4530"/>
    <polygon points="-20,0 140,-70 300,0" fill="#3a2818"/>
    <!-- chimney -->
    <rect x="200" y="-40" width="14" height="40" fill="#3a2818"/>
    <!-- ground floor windows (some lit) -->
    <rect x="20" y="30" width="34" height="40" fill="#D9C28B"/>
    <rect x="74" y="30" width="34" height="40" fill="#D9C28B"/>
    <rect x="128" y="30" width="34" height="40" fill="#1B2E22"/>
    <rect x="182" y="30" width="34" height="40" fill="#D9C28B"/>
    <rect x="236" y="30" width="34" height="40" fill="#1B2E22"/>
    <!-- second floor -->
    <rect x="20" y="80" width="34" height="40" fill="#1B2E22"/>
    <rect x="74" y="80" width="34" height="40" fill="#D9C28B"/>
    <rect x="128" y="80" width="34" height="40" fill="#D9C28B"/>
    <rect x="182" y="80" width="34" height="40" fill="#1B2E22"/>
    <rect x="236" y="80" width="34" height="40" fill="#D9C28B"/>
    <!-- door -->
    <rect x="120" y="100" width="40" height="40" fill="#3a2818"/>
    <!-- window glows -->
    <ellipse cx="37" cy="50" rx="40" ry="20" fill="url(#windowGlow)"/>
    <ellipse cx="91" cy="50" rx="40" ry="20" fill="url(#windowGlow)"/>
    <ellipse cx="199" cy="50" rx="40" ry="20" fill="url(#windowGlow)"/>
    <ellipse cx="91" cy="100" rx="40" ry="20" fill="url(#windowGlow)"/>
    <ellipse cx="145" cy="100" rx="40" ry="20" fill="url(#windowGlow)"/>
    <ellipse cx="253" cy="100" rx="40" ry="20" fill="url(#windowGlow)"/>
  </g>
  <!-- shooting star -->
  <line x1="100" y1="60" x2="170" y2="100" stroke="#F2EFE6" stroke-width="1.5" opacity="0.6"/>
</svg>
