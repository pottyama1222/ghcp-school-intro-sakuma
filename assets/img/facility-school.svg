<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="校舎">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B2E22"/><stop offset="1" stop-color="#2F5D3A"/>
    </linearGradient>
    <radialGradient id="beam" cx="0.3" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#D9C28B" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D9C28B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A57E5A"/><stop offset="1" stop-color="#7A5A3D"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B4530"/><stop offset="1" stop-color="#3a2818"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky)"/>
  <rect width="600" height="400" fill="url(#beam)"/>
  <!-- distant mountains -->
  <path d="M0,260 L120,180 L220,240 L340,160 L460,230 L600,180 L600,300 L0,300 Z" fill="rgba(15,27,20,0.5)"/>
  <!-- trees back -->
  <g fill="#0F1B14" opacity="0.85">
    <polygon points="40,300 90,170 140,300"/>
    <polygon points="100,310 150,180 200,310"/>
    <polygon points="450,300 500,180 550,300"/>
    <polygon points="510,310 560,200 610,310"/>
  </g>
  <g fill="#6FA46B" opacity="0.35">
    <circle cx="90" cy="200" r="50"/>
    <circle cx="150" cy="210" r="55"/>
    <circle cx="500" cy="200" r="55"/>
    <circle cx="560" cy="220" r="50"/>
  </g>
  <!-- school building -->
  <g>
    <!-- second wing -->
    <rect x="160" y="220" width="80" height="120" fill="#7A5A3D"/>
    <polygon points="150,220 200,180 250,220" fill="url(#roof)"/>
    <rect x="175" y="245" width="20" height="30" fill="#D9C28B"/>
    <rect x="205" y="245" width="20" height="30" fill="#D9C28B"/>
    <!-- main building -->
    <rect x="220" y="180" width="200" height="160" fill="url(#wood)"/>
    <polygon points="200,180 320,100 440,180" fill="url(#roof)"/>
    <!-- chimney -->
    <rect x="370" y="120" width="14" height="30" fill="#3a2818"/>
    <!-- windows -->
    <g fill="#D9C28B">
      <rect x="240" y="200" width="30" height="40"/>
      <rect x="285" y="200" width="30" height="40"/>
      <rect x="330" y="200" width="30" height="40"/>
      <rect x="375" y="200" width="30" height="40"/>
      <rect x="240" y="260" width="30" height="40"/>
      <rect x="375" y="260" width="30" height="40"/>
    </g>
    <!-- window frames -->
    <g stroke="#3a2818" stroke-width="1.5" fill="none">
      <line x1="255" y1="200" x2="255" y2="240"/>
      <line x1="240" y1="220" x2="270" y2="220"/>
      <line x1="300" y1="200" x2="300" y2="240"/>
      <line x1="285" y1="220" x2="315" y2="220"/>
      <line x1="345" y1="200" x2="345" y2="240"/>
      <line x1="330" y1="220" x2="360" y2="220"/>
      <line x1="390" y1="200" x2="390" y2="240"/>
      <line x1="375" y1="220" x2="405" y2="220"/>
    </g>
    <!-- door -->
    <rect x="295" y="290" width="50" height="50" fill="#3a2818"/>
    <rect x="298" y="293" width="44" height="44" fill="#5B4530"/>
    <circle cx="335" cy="318" r="2" fill="#D9C28B"/>
    <!-- step -->
    <rect x="285" y="338" width="70" height="6" fill="#5B4530"/>
  </g>
  <!-- ground -->
  <rect y="340" width="600" height="60" fill="#0F1B14"/>
  <!-- path -->
  <polygon points="290,400 350,400 340,344 300,344" fill="#6E5236" opacity="0.7"/>
  <!-- foreground grass -->
  <g fill="#1B2E22">
    <circle cx="60" cy="370" r="20"/>
    <circle cx="540" cy="375" r="22"/>
    <circle cx="100" cy="380" r="14"/>
    <circle cx="500" cy="385" r="14"/>
  </g>
</svg>
